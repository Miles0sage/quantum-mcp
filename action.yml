name: "PQC Posture Scanner"
description: "Scan your codebase for quantum-vulnerable cryptography. Detects RSA, ECDSA, DH, weak hashes, and generates a Crypto Bill of Materials (CBOM)."
author: "Miles0sage"

branding:
  icon: "shield"
  color: "purple"

inputs:
  path:
    description: "Path to scan (relative to repo root)"
    required: false
    default: "."
  fail-on:
    description: "Fail the action if risk level meets or exceeds this threshold (CRITICAL, HIGH, MEDIUM, LOW, NONE)"
    required: false
    default: "CRITICAL"
  format:
    description: "Output format: text, json, sarif"
    required: false
    default: "text"
  context-filter:
    description: "Filter findings by context: all, prod, test"
    required: false
    default: "all"

outputs:
  risk-score:
    description: "Quantum risk score (0-100)"
    value: ${{ steps.scan.outputs.risk-score }}
  risk-level:
    description: "Risk level: CRITICAL, HIGH, MEDIUM, or LOW"
    value: ${{ steps.scan.outputs.risk-level }}
  findings-count:
    description: "Total number of crypto findings"
    value: ${{ steps.scan.outputs.findings-count }}
  production-findings:
    description: "Number of production (non-test) findings"
    value: ${{ steps.scan.outputs.production-findings }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Run PQC Posture Scan
      id: scan
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_CONTEXT_FILTER: ${{ inputs.context-filter }}
      run: |
        python3 << 'PYTHON_SCRIPT'
        import os
        import sys
        import json

        # Add the action directory to path so we can import pqc_posture
        action_dir = os.path.dirname(os.path.abspath("${{ github.action_path }}/pqc_posture.py"))
        sys.path.insert(0, "${{ github.action_path }}")

        from pqc_posture import scan_codebase, print_report

        scan_path = os.environ.get("INPUT_PATH", ".")
        fail_on = os.environ.get("INPUT_FAIL_ON", "CRITICAL").upper()
        output_format = os.environ.get("INPUT_FORMAT", "text").lower()
        context_filter = os.environ.get("INPUT_CONTEXT_FILTER", "all").lower()

        # Resolve scan path relative to workspace
        workspace = os.environ.get("GITHUB_WORKSPACE", os.getcwd())
        full_path = os.path.join(workspace, scan_path)

        if not os.path.isdir(full_path):
            print(f"::error::Scan path does not exist: {full_path}")
            sys.exit(1)

        # Run the scan
        result = scan_codebase(full_path)

        # Apply context filter
        if context_filter == "prod":
            result["findings"] = [f for f in result["findings"] if f.get("context") != "test"]
            result["total_findings"] = len(result["findings"])
        elif context_filter == "test":
            result["findings"] = [f for f in result["findings"] if f.get("context") == "test"]
            result["total_findings"] = len(result["findings"])

        # Count production findings (regardless of filter, for the output)
        all_result = scan_codebase(full_path)
        prod_findings = [f for f in all_result["findings"] if f.get("context") != "test"]

        # Set outputs via GITHUB_OUTPUT
        output_file = os.environ.get("GITHUB_OUTPUT", "")
        if output_file:
            with open(output_file, "a") as f:
                f.write(f"risk-score={result['risk_score']}\n")
                f.write(f"risk-level={result['risk_level']}\n")
                f.write(f"findings-count={result['total_findings']}\n")
                f.write(f"production-findings={len(prod_findings)}\n")

        # Generate output
        if output_format == "json":
            output = json.dumps(result, indent=2)
            print(output)
            # Write JSON artifact
            with open("pqc-results.json", "w") as f:
                f.write(output)

        elif output_format == "sarif":
            # Generate SARIF 2.1.0 for GitHub Code Scanning
            sarif = {
                "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
                "version": "2.1.0",
                "runs": [
                    {
                        "tool": {
                            "driver": {
                                "name": "PQC Posture Scanner",
                                "version": "0.1.0",
                                "informationUri": "https://github.com/Miles0sage/quantum-mcp",
                                "rules": [],
                            }
                        },
                        "results": [],
                    }
                ],
            }

            # Build rules and results
            rules_map = {}
            run = sarif["runs"][0]

            for finding in result["findings"]:
                rule_id = f"pqc/{finding['algorithm'].lower().replace(' ', '-').replace('/', '-')}"

                if rule_id not in rules_map:
                    level_map = {
                        "CRITICAL": "error",
                        "HIGH": "warning",
                        "MEDIUM": "note",
                        "LOW": "note",
                    }
                    rules_map[rule_id] = {
                        "id": rule_id,
                        "name": finding["algorithm"],
                        "shortDescription": {
                            "text": f"Quantum-vulnerable: {finding['algorithm']} ({finding['quantum_status']})"
                        },
                        "fullDescription": {
                            "text": f"{finding['algorithm']} is {finding['quantum_status']} by quantum computers. Migration: {finding['migration']}. Ref: {finding['nist_ref']}"
                        },
                        "helpUri": "https://csrc.nist.gov/projects/post-quantum-cryptography",
                        "defaultConfiguration": {
                            "level": level_map.get(finding["raw_risk"], "note")
                        },
                        "properties": {
                            "tags": ["security", "cryptography", "quantum", finding["category"]],
                        },
                    }
                    run["tool"]["driver"]["rules"].append(rules_map[rule_id])

                level_map = {
                    "CRITICAL": "error",
                    "HIGH": "warning",
                    "MEDIUM": "note",
                    "LOW": "note",
                }

                run["results"].append(
                    {
                        "ruleId": rule_id,
                        "level": level_map.get(finding["risk"], "note"),
                        "message": {
                            "text": f"{finding['algorithm']} detected ({finding['quantum_status']}). Context: {finding['context']}. Migration: {finding['migration']}"
                        },
                        "locations": [
                            {
                                "physicalLocation": {
                                    "artifactLocation": {
                                        "uri": finding["file"],
                                        "uriBaseId": "%SRCROOT%",
                                    },
                                    "region": {
                                        "startLine": finding["line"],
                                        "startColumn": 1,
                                    },
                                }
                            }
                        ],
                        "properties": {
                            "quantum_status": finding["quantum_status"],
                            "context": finding["context"],
                            "category": finding["category"],
                            "nist_ref": finding["nist_ref"],
                        },
                    }
                )

            sarif_output = json.dumps(sarif, indent=2)
            with open("pqc-results.sarif", "w") as f:
                f.write(sarif_output)
            print(f"SARIF report written to pqc-results.sarif ({len(run['results'])} results)")

        else:
            # Text output (default)
            print_report(result)

        # Write CBOM artifact
        with open("CBOM.json", "w") as f:
            json.dump(result["cbom"], f, indent=2)

        # Determine if we should fail
        risk_levels = {"LOW": 0, "MEDIUM": 1, "HIGH": 2, "CRITICAL": 3, "NONE": 4}
        current_level = risk_levels.get(result["risk_level"], 0)
        fail_threshold = risk_levels.get(fail_on, 3)

        if current_level >= fail_threshold:
            print(f"\n::error::PQC risk level {result['risk_level']} (score: {result['risk_score']}) meets or exceeds fail threshold {fail_on}")
            sys.exit(1)
        else:
            print(f"\nPQC risk level {result['risk_level']} (score: {result['risk_score']}) is below fail threshold {fail_on}")

        PYTHON_SCRIPT
