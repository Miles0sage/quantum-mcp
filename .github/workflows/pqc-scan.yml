name: PQC Posture Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  pqc-scan:
    name: Scan for Quantum-Vulnerable Cryptography
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run PQC Posture Scanner (text report)
        id: scan-text
        uses: ./
        with:
          path: "."
          fail-on: "CRITICAL"
          format: "text"
          context-filter: "all"
        continue-on-error: true

      - name: Run PQC Posture Scanner (SARIF)
        id: scan-sarif
        uses: ./
        with:
          path: "."
          fail-on: "NONE"
          format: "sarif"
          context-filter: "all"

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pqc-results.sarif
          category: "pqc-posture"

      - name: Upload CBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crypto-bill-of-materials
          path: CBOM.json

      - name: Comment on PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        env:
          RISK_SCORE: ${{ steps.scan-text.outputs.risk-score }}
          RISK_LEVEL: ${{ steps.scan-text.outputs.risk-level }}
          FINDINGS_COUNT: ${{ steps.scan-text.outputs.findings-count }}
          PROD_FINDINGS: ${{ steps.scan-text.outputs.production-findings }}
          SCAN_OUTCOME: ${{ steps.scan-text.outcome }}
        with:
          script: |
            const riskScore = process.env.RISK_SCORE || '?';
            const riskLevel = process.env.RISK_LEVEL || '?';
            const findingsCount = process.env.FINDINGS_COUNT || '?';
            const prodFindings = process.env.PROD_FINDINGS || '?';
            const outcome = process.env.SCAN_OUTCOME;

            const statusEmoji = outcome === 'success' ? '\u2705' : '\u274c';
            const riskEmoji = {
              'CRITICAL': '\ud83d\udea8',
              'HIGH': '\u26a0\ufe0f',
              'MEDIUM': '\ud83d\udfe1',
              'LOW': '\ud83d\udfe2',
            }[riskLevel] || '\u2753';

            const body = [
              `## ${riskEmoji} PQC Posture Scan Results`,
              '',
              '| Metric | Value |',
              '|--------|-------|',
              `| **Risk Score** | ${riskScore}/100 |`,
              `| **Risk Level** | ${riskLevel} |`,
              `| **Total Findings** | ${findingsCount} |`,
              `| **Production Findings** | ${prodFindings} |`,
              `| **Status** | ${statusEmoji} ${outcome === 'success' ? 'Passed' : 'Failed (threshold exceeded)'} |`,
              '',
              '### What is this?',
              '',
              'This scan detects **quantum-vulnerable cryptography** in your codebase:',
              '- RSA, ECDSA, DH key exchange (broken by quantum computers)',
              '- Weak hashes like MD5, SHA-1 (weakened by Grover\'s algorithm)',
              '- Outdated protocols like TLS 1.0/1.1',
              '',
              'Findings are annotated in the **Code Scanning** tab with NIST migration guidance.',
              '',
              '---',
              '*Powered by [PQC Posture Scanner](https://github.com/Miles0sage/quantum-mcp)*',
            ].join('\n');

            // Find and update existing comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = 'PQC Posture Scan Results';
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Fail if risk threshold exceeded
        if: steps.scan-text.outcome == 'failure'
        run: |
          echo "::error::PQC Posture scan failed — risk level ${{ steps.scan-text.outputs.risk-level }} (score: ${{ steps.scan-text.outputs.risk-score }}) exceeds threshold"
          exit 1
